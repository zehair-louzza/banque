name: tests

# Lance les tests à chaque push et pull request sur main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rendu_louzza_zehair

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tests Partie 2 — module bancaire
        working-directory: rendu_louzza_zehair/Partie_02/module_bancaire
        run: pytest -v

      - name: Tests Partie 3 — API livres
        working-directory: rendu_louzza_zehair/Partie_03/api_livres
        run: pytest -v
